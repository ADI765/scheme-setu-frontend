<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Scheme Setu</title>
  <meta name="description"
    content="Login or sign up to Scheme Setu to discover government schemes you're eligible for." />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0D7C66",
            accent: "#17B897",
            bg: "#E5E7EB",
            surface: "#FFFFFF",
            "surface-soft": "#E5E7EB",
            "text-primary": "#1F2937",
            "text-secondary": "#6B7280",
          },
          fontFamily: {
            sans: ['"Inter"', "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .text-gradient {
      background: linear-gradient(135deg, #0D7C66, #17B897);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Login card styles */
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px -12px rgba(0,0,0,0.15);
      animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #1F2937;
      background: #F3F4F6;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      margin-bottom: 0;
    }
    .login-card input:focus {
      outline: none;
      border-color: #0D7C66;
      box-shadow: 0 0 0 3px rgba(13,124,102,0.12);
      background: #fff;
    }
    .login-card input::placeholder { color: #9CA3AF; }
    .login-card label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.375rem;
    }
    .login-btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #0D7C66, #17B897);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 4px 14px rgba(13,124,102,0.25);
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #0a6b58, #14a687);
      box-shadow: 0 6px 24px rgba(13,124,102,0.35);
      transform: translateY(-2px);
    }
    .login-btn:active {
      transform: scale(0.97) translateY(0);
    }
    /* Avatar group */
    .avatar-group {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .avatar-group .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid #fff;
      margin-left: -10px;
      background: #D1D5DB;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .avatar-group .avatar:first-child { margin-left: 0; }
    .avatar-group .avatar-count {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid #fff;
      margin-left: -10px;
      background: #0D7C66;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    /* Error style override */
    .login-card .auth-error {
      font-size: 0.8125rem;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    /* Nav override */
    .nav-link::after { background: #0D7C66; }
  </style>
</head>

<body class="bg-bg text-text-primary min-h-screen flex flex-col">

  <!-- ========== NAVBAR ========== -->
  <nav class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-surface-soft/60 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 group">
        <span class="text-lg font-bold text-text-primary">Scheme<span class="text-gradient">Setu</span></span>
      </a>
      <a href="index.html" class="text-sm font-medium text-text-secondary hover:text-primary transition-colors flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Home
      </a>
    </div>
  </nav>

  <!-- ========== LOGIN CONTENT ========== -->
  <div class="flex-1 flex items-center justify-center px-4 py-10">

    <!-- Auth overlay kept for JS compatibility, but styled inline -->
    <div id="auth-overlay" style="display:contents;">

      <div class="login-card">



        <!-- Login Card (default visible) -->
        <div id="auth-login-card" class="auth-card">
          <h2 class="text-xl font-bold text-center text-text-primary mb-6" style="display:block !important;">Login to SchemeSetu</h2>
          <p class="auth-subtitle" style="display:none;">Log in to discover schemes you deserve.</p>
          <div id="auth-login-error" class="auth-error hidden"></div>
          <form id="auth-login-form">
            <label for="auth-login-username">Email</label>
            <input type="text" id="auth-login-username" placeholder="Enter your username" autocomplete="username"
              required />
            <div class="mb-4"></div>
            <label for="auth-login-password">Password</label>
            <input type="password" id="auth-login-password" placeholder="Enter your password"
              autocomplete="current-password" required />
            <div class="mb-5"></div>
            <button type="submit" class="login-btn">Login</button>
          </form>
          <div class="text-center text-sm text-text-secondary mt-5">New User? <a id="auth-show-signup" class="text-primary font-semibold cursor-pointer hover:underline">Create Account</a></div>
        </div>

        <!-- Signup Card (hidden by default) -->
        <div id="auth-signup-card" class="auth-card hidden">
          <h2 class="text-xl font-bold text-center text-text-primary mb-6" style="display:block !important;">Create Account</h2>
          <p class="auth-subtitle" style="display:none;">Join Scheme Setu to find eligible schemes.</p>
          <div id="auth-signup-error" class="auth-error hidden"></div>
          <form id="auth-signup-form">
            <label for="auth-signup-username">Username *</label>
            <input type="text" id="auth-signup-username" placeholder="Choose a username" autocomplete="username"
              required />
            <div class="mb-4"></div>
            <label for="auth-signup-password">Password *</label>
            <input type="password" id="auth-signup-password" placeholder="Choose a password" autocomplete="new-password"
              required />
            <div class="mb-4"></div>
            <label for="auth-signup-phone">Phone (optional)</label>
            <input type="tel" id="auth-signup-phone" placeholder="e.g. 9876543210" autocomplete="tel" />
            <div class="mb-5"></div>
            <button type="submit" class="login-btn">Sign Up</button>
          </form>
          <div class="text-center text-sm text-text-secondary mt-5">Already have an account? <a id="auth-show-login" class="text-primary font-semibold cursor-pointer hover:underline">Log In</a></div>
        </div>

      </div>

    </div>

  </div>

  <!-- ========== FOOTER ========== -->
  <footer class="border-t border-white/20 px-4 sm:px-6 py-5 bg-white/50">
    <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-text-secondary">
      <p class="font-bold text-text-primary text-sm">SchemeSetu</p>
      <div class="flex items-center gap-4">
        <a href="#" class="hover:text-primary transition-colors">Terms of Service</a>
        <a href="#" class="hover:text-primary transition-colors">Accessibility</a>
        <a href="#" class="hover:text-primary transition-colors">Contact</a>
      </div>
    </div>
  </footer>

  <!-- Hidden elements for JS compatibility -->
  <div style="display:none;">
    <button id="tab-signin"></button>
    <button id="tab-signup"></button>
  </div>

  <!-- Auth Script -->
  <script src="js/auth.js"></script>

  <!-- Auth Tab Toggle -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // If already logged in, redirect to dashboard
      if (typeof Auth !== "undefined" && Auth.isAuthenticated()) {
        window.location.href = "dashboard.html";
        return;
      }

      const tabSignin = document.getElementById("tab-signin");
      const tabSignup = document.getElementById("tab-signup");
      const showSignup = document.getElementById("auth-show-signup");
      const showLogin = document.getElementById("auth-show-login");

      function activateTab(activeTab, inactiveTab) {
        activeTab.classList.add("active");
        inactiveTab.classList.remove("active");
      }

      if (tabSignin && tabSignup) {
        tabSignin.addEventListener("click", () => {
          activateTab(tabSignin, tabSignup);
          if (showLogin) showLogin.click();
        });
        tabSignup.addEventListener("click", () => {
          activateTab(tabSignup, tabSignin);
          if (showSignup) showSignup.click();
        });
      }

      if (showSignup) showSignup.addEventListener("click", () => activateTab(tabSignup, tabSignin));
      if (showLogin) showLogin.addEventListener("click", () => activateTab(tabSignin, tabSignup));
    });
  </script>
</body>

</html>
